name: Instagram to Sheets Scraper

on:
  schedule:
    - cron: '0 13,19 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      USERNAMES: ${{ secrets.USERNAMES || secrets.INSTAGRAM_USERNAME || 'ufbrand_salwar' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        continue-on-error: true

      - name: Verify environment
        run: |
          echo "USERNAMES: $USERNAMES"
          echo "GOOGLE_SHEET_ID is set: ${{ secrets.GOOGLE_SHEET_ID != '' }}"
          echo "GOOGLE_CREDENTIALS is set: ${{ secrets.GOOGLE_CREDENTIALS != '' }}"
          echo "Node version: $(node --version)"

      - name: Run Scraper
        run: node src/export.js
        env:
          USERNAMES: ${{ env.USERNAMES }}
          GOOGLE_SHEET_ID: ${{ env.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ env.GOOGLE_CREDENTIALS }}
          MAX_POSTS_PER_USER: '20'
